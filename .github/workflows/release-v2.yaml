name: "Create tag and release for standard-service-v2"

on:
  push:
    branches:
      - "main"
    paths:
      - "standard-service-v2/**"

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read chart version
        id: chart
        run: |
          VERSION=$(grep '^version:' standard-service-v2/Chart.yaml | awk '{print $2}')
          TAG="chart-v2/v${VERSION}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          echo "Chart version: ${VERSION}"
          echo "Tag: ${TAG}"

      - name: Check if tag already exists
        id: tagcheck
        run: |
          if git rev-parse "${{ steps.chart.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail if tag already exists
        if: steps.tagcheck.outputs.exists == 'true'
        run: |
          echo "Tag ${{ steps.chart.outputs.tag }} already exists."
          exit 1

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag "${{ steps.chart.outputs.tag }}"
          git push origin "${{ steps.chart.outputs.tag }}"

      - name: Generate release notes
        run: |
          NOTES="./notes.md"
          PREV_TAG=$(git tag --sort=-creatordate | grep '^standard-service-v2/v' | grep -vx "${{ steps.chart.outputs.tag }}" | head -n 1 || true)

          echo "## standard-service-v2 Changelog" > "${NOTES}"
          echo "" >> "${NOTES}"
          echo "**Version:** ${{ steps.chart.outputs.version }}" >> "${NOTES}"
          echo "" >> "${NOTES}"

          if [ -n "${PREV_TAG}" ]; then
            echo "Changes since ${PREV_TAG}:" >> "${NOTES}"
            echo "" >> "${NOTES}"
            git log --pretty=format:'- %s (%h)' "${PREV_TAG}"..HEAD -- standard-service-v2 >> "${NOTES}"
          else
            echo "Initial release." >> "${NOTES}"
            echo "" >> "${NOTES}"
            git log --pretty=format:'- %s (%h)' -- standard-service-v2 >> "${NOTES}"
          fi

          cat "${NOTES}"

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.chart.outputs.tag }}
          name: ${{ steps.chart.outputs.tag }}
          bodyFile: "notes.md"
          token: ${{ secrets.GITHUB_TOKEN }}